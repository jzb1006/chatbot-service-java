server:
  port: 8766
spring:
  threads:
    virtual:
      enabled: true
chatbot:
  device:
    config-path: /app/data/llm_config.json
  hermes:
    base-url: http://hermes:8642/v1
  ota:
    enabled: ${XIAOZHI_OTA_ENABLED:true}
    websocket:
      url: ${XIAOZHI_OTA_WEBSOCKET_URL:}
      token: ${XIAOZHI_OTA_WEBSOCKET_TOKEN:${XIAOZHI_WEBSOCKET_TOKEN:}}
      version: ${XIAOZHI_OTA_WEBSOCKET_VERSION:1}
    firmware:
      version: ${XIAOZHI_OTA_FIRMWARE_VERSION:}
      url: ${XIAOZHI_OTA_FIRMWARE_URL:}
      force: ${XIAOZHI_OTA_FIRMWARE_FORCE:false}
      directory: ${XIAOZHI_OTA_FIRMWARE_DIR:/app/firmware}
    activation:
      required: ${XIAOZHI_OTA_ACTIVATION_REQUIRED:false}
      message: ${XIAOZHI_OTA_ACTIVATION_MESSAGE:请在服务端完成设备激活}
      ttl-seconds: ${XIAOZHI_OTA_ACTIVATION_TTL_SECONDS:30}
    security:
      allowed-device-ids: ${XIAOZHI_OTA_ALLOWED_DEVICE_IDS:}
      allowed-serial-numbers: ${XIAOZHI_OTA_ALLOWED_SERIAL_NUMBERS:}
  voice:
    default-voice-id: ${CHATBOT_VOICE_DEFAULT_VOICE_ID:default}
    websocket:
      token: ${XIAOZHI_WEBSOCKET_TOKEN:}
    mcp:
      auth-required: ${XIAOZHI_MCP_AUTH_REQUIRED:false}
      admin-token: ${XIAOZHI_MCP_ADMIN_TOKEN:}
      hermes-token: ${XIAOZHI_MCP_HERMES_TOKEN:${XIAOZHI_MCP_ADMIN_TOKEN:}}
    audio:
      format: ${CHATBOT_VOICE_AUDIO_FORMAT:opus}
      sample-rate: ${CHATBOT_VOICE_AUDIO_SAMPLE_RATE:16000}
      channels: ${CHATBOT_VOICE_AUDIO_CHANNELS:1}
      frame-duration: ${CHATBOT_VOICE_AUDIO_FRAME_DURATION:60}
    barge-in:
      enabled: ${CHATBOT_VOICE_BARGE_IN_ENABLED:false}
      min-text-length: ${CHATBOT_VOICE_BARGE_IN_MIN_TEXT_LENGTH:2}
      cooldown-ms: ${CHATBOT_VOICE_BARGE_IN_COOLDOWN_MS:500}
      similarity-threshold: ${CHATBOT_VOICE_BARGE_IN_SIMILARITY_THRESHOLD:0.82}
      asr-timeout: ${CHATBOT_VOICE_BARGE_IN_ASR_TIMEOUT:2s}
    session-end:
      enabled: ${CHATBOT_VOICE_SESSION_END_ENABLED:false}
      default-confirmation-text: ${CHATBOT_VOICE_SESSION_END_DEFAULT_CONFIRMATION_TEXT:回头再聊}
      close-status-code: ${CHATBOT_VOICE_SESSION_END_CLOSE_STATUS_CODE:1000}
      close-reason: ${CHATBOT_VOICE_SESSION_END_CLOSE_REASON:session ended}
    music:
      enabled: ${CHATBOT_VOICE_MUSIC_ENABLED:false}
      ffmpeg-path: ${CHATBOT_VOICE_MUSIC_FFMPEG_PATH:ffmpeg}
      connect-timeout: ${CHATBOT_VOICE_MUSIC_CONNECT_TIMEOUT:3s}
      max-duration: ${CHATBOT_VOICE_MUSIC_MAX_DURATION:5m}
      allowed-hosts: ${CHATBOT_VOICE_MUSIC_ALLOWED_HOSTS:}
      sample-rate: ${CHATBOT_VOICE_MUSIC_SAMPLE_RATE:16000}
      frame-duration-ms: ${CHATBOT_VOICE_MUSIC_FRAME_DURATION_MS:60}
      bitrate-bps: ${CHATBOT_VOICE_MUSIC_BITRATE_BPS:64000}
      complexity: ${CHATBOT_VOICE_MUSIC_COMPLEXITY:10}
    asr:
      mode: ${CHATBOT_VOICE_ASR_MODE:sentence}
      provider: ${CHATBOT_VOICE_ASR_PROVIDER:fake}
      tencent:
        app-id: ${TENCENT_CLOUD_APP_ID:}
        secret-id: ${TENCENT_CLOUD_SECRET_ID:}
        secret-key: ${TENCENT_CLOUD_SECRET_KEY:}
        region: ap-guangzhou
        endpoint: asr.tencentcloudapi.com
        engine-model-type: ${TENCENT_CLOUD_ASR_ENGINE_MODEL_TYPE:16k_zh}
        voice-format: ${TENCENT_CLOUD_ASR_VOICE_FORMAT:pcm}
        sample-rate: 16000
        timeout-seconds: 15
        chunk-timeout-millis: ${TENCENT_CLOUD_ASR_CHUNK_TIMEOUT_MILLIS:100}
        recognition-timeout-seconds: ${TENCENT_CLOUD_ASR_RECOGNITION_TIMEOUT_SECONDS:90}
      sherpa-onnx:
        url: ${SHERPA_ONNX_ASR_URL:}
        chunk-timeout-millis: ${SHERPA_ONNX_ASR_CHUNK_TIMEOUT_MILLIS:100}
        recognition-timeout-seconds: ${SHERPA_ONNX_ASR_RECOGNITION_TIMEOUT_SECONDS:90}
    tts:
      default-speed: ${CHATBOT_VOICE_TTS_DEFAULT_SPEED:1.0}
      default-pitch: ${CHATBOT_VOICE_TTS_DEFAULT_PITCH:1.0}
      provider: ${CHATBOT_VOICE_TTS_PROVIDER:tencent}
      edge:
        voice: ${CHATBOT_VOICE_TTS_EDGE_VOICE:zh-CN-XiaoxiaoNeural}
        output-format: ${CHATBOT_VOICE_TTS_EDGE_OUTPUT_FORMAT:audio-24khz-48kbitrate-mono-mp3}
        sample-rate: ${CHATBOT_VOICE_TTS_EDGE_SAMPLE_RATE:16000}
        ffmpeg-path: ${CHATBOT_VOICE_TTS_EDGE_FFMPEG_PATH:ffmpeg}
        timeout-seconds: ${CHATBOT_VOICE_TTS_EDGE_TIMEOUT_SECONDS:15}
      tencent:
        app-id: ${TENCENT_CLOUD_APP_ID:}
        secret-id: ${TENCENT_CLOUD_SECRET_ID:}
        secret-key: ${TENCENT_CLOUD_SECRET_KEY:}
        region: ap-guangzhou
        endpoint: tts.tencentcloudapi.com
        voice-type: ${TENCENT_CLOUD_TTS_VOICE_TYPE:101001}
        codec: pcm
        sample-rate: 16000
        timeout-seconds: 15
        stream-timeout-seconds: 30
